<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Pro Remodeling LLC</title>
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #050608;
            border-bottom: 1px solid #1f2833;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #f07b07, #a85000);
            color: white;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .logo-text {
            color: #f07b07;
            font-weight: bold;
            font-size: 1.3rem;
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1581094288338-2314dddb7eed?q=80&w=1200') no-repeat center center/cover;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .hero-content h1 span {
            background: linear-gradient(90deg, #00d2ff, #9b5de5, #f15bb5, #fee440);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: #c5c6c7;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-call {
            background: linear-gradient(135deg, #d45d00, #b33600);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(212, 93, 0, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-call:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 93, 0, 0.6);
        }

        /* --- CONTACT CARDS SECTION --- */
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: #f07b07;
            margin-bottom: 40px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .contact-card {
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: transform 0.3s;
        }

        .contact-card:hover {
            transform: translateY(-5px);
        }

        .card-phone {
            background: linear-gradient(180deg, #00b09b, #96c93d);
            box-shadow: 0 10px 30px rgba(0, 176, 155, 0.3);
        }

        .card-email {
            background: linear-gradient(180deg, #4776e6, #8e54e9);
            box-shadow: 0 10px 30px rgba(71, 118, 230, 0.3);
        }

        .card-address {
            background: linear-gradient(180deg, #f12711, #f5af19);
            box-shadow: 0 10px 30px rgba(245, 175, 25, 0.3);
        }

        .card-icon {
            font-size: 2.5rem;
        }

        .card-label {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .card-value {
            font-size: 1.2rem;
            font-weight: bold;
            word-break: break-all;
        }

        .map-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-map {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            backdrop-filter: blur(5px);
            transition: background 0.2s;
        }

        .btn-map:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* --- APPOINTMENT FORM --- */
        .booking-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #16171e;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .booking-header {
            background: linear-gradient(135deg, #f07b07, #a85000);
            padding: 30px;
            text-align: center;
        }

        .booking-header h2 {
            font-size: 1.8rem;
            margin-top: 10px;
        }

        .booking-form {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #a0a5b5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group textarea {
            background-color: #20222e;
            border: 1px solid #2e3041;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #f07b07;
        }

        .btn-submit {
            background: linear-gradient(135deg, #f07b07, #a85000);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        /* --- RESPONSIVE BREAKPOINTS --- */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2.2rem;
            }
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">AP</div>
            <div class="logo-text">Apex pro remodeling LLC</div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Apex pro <span>remodeling</span> LLC</h1>
            <p>Committed to providing the best service to our customers.</p>
            <a href="tel:3035216431" class="btn-call">📞 Call Now</a>
        </div>
    </section>

    <div class="container">
        
        <h2 class="section-title">Contact</h2>
        <div class="contact-grid">
            <div class="contact-card card-phone">
                <div class="card-icon">☎️</div>
                <div class="card-label">Phone</div>
                <div class="card-value">303-521-6431</div>
                <div class="card-value" style="margin-top: 5px;">303-598-2712</div>
            </div>

            <div class="contact-card card-email">
                <div class="card-icon">✉️</div>
                <div class="card-label">Email</div>
                <div class="card-value">apexp800@gmail.com</div>
            </div>

            <div class="contact-card card-address">
                <div class="card-icon">📍</div>
                <div class="card-label">Address</div>
                <div class="card-value">5586 S Rome St Aurora, CO 80015</div>
                <div class="map-buttons">
                    <a href="https://maps.google.com/?q=5586+S+Rome+St+Aurora+CO+80015" target="_blank" class="btn-map">🗺️ Google Maps</a>
                    <a href="http://maps.apple.com/?address=5586+S+Rome+St,Aurora,CO,80015" target="_blank" class="btn-map">🍎 Apple Maps</a>
                </div>
            </div>
        </div>

        <div class="booking-container">
            <div class="booking-header">
                <div style="font-size: 2rem;">📅</div>
                <h2>Book Appointment</h2>
            </div>
            <form class="booking-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" required placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" required placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Email (optional)">
                </div>

                <div class="form-group">
                    <label for="address">Project / Service Address</label>
                    <input type="text" id="address" placeholder="123 Main St, Aurora, CO (optional)">
                </div>

                <div class="form-group">
                    <label for="date">Select Date *</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" rows="4" placeholder="Additional notes or project details (optional)"></textarea>
                </div>

                <button type="submit" class="btn-submit">✨ Book Now</button>
            </form>
        </div>

    </div>

</body>
</html>
